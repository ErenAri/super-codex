name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag override (latest|next|beta)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify consistency
        run: npm run verify:consistency

      - name: Resolve dist-tag
        id: dist_tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.dist_tag }}" ]; then
            echo "value=${{ github.event.inputs.dist_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *"-"* ]]; then
            echo "value=next" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        run: npm publish --access public --provenance --tag "${{ steps.dist_tag.outputs.value }}"
