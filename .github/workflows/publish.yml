name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag override (latest|next|beta)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify consistency
        run: npm run verify:consistency

      - name: Resolve dist-tag
        id: dist_tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.dist_tag }}" ]; then
            echo "value=${{ github.event.inputs.dist_tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *"-"* ]]; then
            echo "value=next" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve expected package version
        id: expected_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(node -p "require('./package.json').version")
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: npm publish --access public --provenance --tag "${{ steps.dist_tag.outputs.value }}"

      - name: Verify published dist-tag and version
        run: |
          npm run release:publish:verify -- \
            --package supercodex \
            --version "${{ steps.expected_version.outputs.value }}" \
            --dist-tag "${{ steps.dist_tag.outputs.value }}" \
            --retries 12 \
            --interval-ms 10000 \
            --json
